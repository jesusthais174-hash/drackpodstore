<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drack Pod Store PRO</title>
<style>
body {margin:0;font-family:Arial;background:#0f0f0f;color:#fff}
header {background:#111;padding:20px;text-align:center;font-size:28px;color:#ff6600}
.container {padding:20px}
.card {background:#1a1a1a;padding:15px;border-radius:10px;text-align:center}
button {background:#ff6600;border:none;padding:10px;color:#fff;border-radius:5px;cursor:pointer;margin:5px}
.grid {display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px}
footer {text-align:center;padding:20px;background:#111;margin-top:20px}
.cart {position:fixed;top:20px;right:20px;background:#222;padding:15px;border-radius:10px}
.qr {margin-top:10px}
</style>
</head>
<body>
<header>🔥 Drack Pod Store PRO</header>

<div class="cart">
🛒 Carrinho: <span id="total">R$ 0</span><br>
<button onclick="finalizar()">Finalizar Pedido</button>
</div>

<div class="container">
<h2>💨 Produtos</h2>
<div class="grid">

<div class="card">
<h3>Pod Ice</h3>
<p>R$ 45</p>
<button onclick="add(45,'Pod Ice')">Adicionar</button>
</div>

<div class="card">
<h3>Pod Premium</h3>
<p>R$ 70</p>
<button onclick="add(70,'Pod Premium')">Adicionar</button>
</div>

<div class="card">
<h3>Pod Mega</h3>
<p>R$ 95</p>
<button onclick="add(95,'Pod Mega')">Adicionar</button>
</div>

</div>

<h2>💰 Pagamento PIX</h2>
<div class="card">
<p>Chave PIX: <b id="pixKey">SEU-PIX-AQUI</b></p>
<button onclick="copiarPix()">Copiar PIX</button>
<div class="qr">
<img id="qrImg" width="150">
</div>
</div>
</div>

<footer>
📲 WhatsApp: <span id="zap"></span>
</footer>

<script>
let total = 0;
let carrinho = [];

const numero = '5511999999999';
const chavePix = 'SEU-PIX-AQUI';

document.getElementById('zap').innerText = numero;
document.getElementById('pixKey').innerText = chavePix;

// GERAR QR CODE AUTOMÁTICO
const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${chavePix}`;
document.getElementById('qrImg').src = qrUrl;

function add(valor, nome){
 total += valor;
 carrinho.push(nome);
 document.getElementById('total').innerText = 'R$ ' + total;
}

function finalizar(){
 let lista = carrinho.join(', ');
 let msg = `Pedido: ${lista} | Total: R$ ${total} | Pagamento via PIX`;
 window.open(`https://wa.me/${numero}?text=${encodeURIComponent(msg)}`,'_blank');
}

function copiarPix(){
 navigator.clipboard.writeText(chavePix);
 alert('PIX copiado!');
}
</script>

</body>
</html>
