<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drack Pod Store PRO</title>
<style>
body {margin:0;font-family:Arial;background:#0f0f0f;color:#fff}
header {background:#111;padding:20px;text-align:center;font-size:28px;color:#ff6600}
.container {padding:20px}
.card {background:#1a1a1a;padding:15px;border-radius:10px;text-align:center}
button {background:#ff6600;border:none;padding:10px;color:#fff;border-radius:5px;cursor:pointer;margin:5px}
.grid {display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px}
footer {text-align:center;padding:20px;background:#111;margin-top:20px}
.cart {position:fixed;top:20px;right:20px;background:#222;padding:15px;border-radius:10px}
.qr {margin-top:10px}
</style>
</head>
<body>
<header>🔥 Drack Pod Store PRO</header>

<div class="cart">
🛒 Carrinho: <span id="total">R$ 0</span><br>
</div>

<div class="container">
<h2>💨 Produtos</h2>
<div class="grid">

<div class="card">
<h3>Pod Ice</h3>
<p>R$ 45</p>
<button onclick="add(45,'Pod Ice')">Adicionar</button>
</div>

<div class="card">
<h3>Pod Premium</h3>
<p>R$ 70</p>
<button onclick="add(70,'Pod Premium')">Adicionar</button>
</div>

<div class="card">
<h3>Pod Mega</h3>
<p>R$ 95</p>
<button onclick="add(95,'Pod Mega')">Adicionar</button>
</div>

</div>

<h2>💰 Pagamento PIX (Apenas QR Code)</h2>
<div class="card">
<p>Escaneie o QR Code para pagar</p>
<div class="qr">
<img id="qrImg" width="200">
</div>
</div>
</div>

<footer>
💰 Pagamento somente via PIX
</footer>

<script>
let total = 0;
let carrinho = [];

const chavePix = 'SEU-PIX-AQUI';

// GERAR QR CODE AUTOMÁTICO
function gerarQR(){
 let valor = total > 0 ? total : 1;
 let dados = `${chavePix}|${valor}`;
 let qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${dados}`;
 document.getElementById('qrImg').src = qrUrl;
}

function add(valor, nome){
 total += valor;
 carrinho.push(nome);
 document.getElementById('total').innerText = 'R$ ' + total;
 gerarQR();
}

// gerar QR inicial
window.onload = gerarQR;
</script>

</body>
</html>
